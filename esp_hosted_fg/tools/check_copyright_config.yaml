# Config for the espressif/check-copyright pre-commit hook.
# This repo is multi-license:
#   - slave / ESP firmware (esp_hosted_fg/esp, most of common) -> Apache-2.0
#   - Linux host driver + host control (esp_hosted_fg/host/linux) -> GPL-2.0-only
#   - a few shared headers           -> "GPL-2.0-only OR Apache-2.0"
# so each tree gets its own section. Generated protobuf-c output is ignored.

DEFAULT:
  perform_check: yes
  allowed_licenses:
    - Apache-2.0
    - GPL-2.0-only OR Apache-2.0
    - Unlicense
    - CC0-1.0
  license_for_new_files: Apache-2.0
  new_notice_c: |
    /*
     * SPDX-FileCopyrightText: {years} Espressif Systems (Shanghai) CO LTD
     *
     * SPDX-License-Identifier: {license}
     */
  new_notice_python: |
    # SPDX-FileCopyrightText: {years} Espressif Systems (Shanghai) CO LTD
    # SPDX-License-Identifier: {license}
  espressif_copyright: '{years} Espressif Systems (Shanghai) CO LTD'

# Linux host (kernel driver + host_control) is GPL-2.0-only.
linux_host:
  perform_check: yes
  allowed_licenses:
    - GPL-2.0-only
    - GPL-2.0-only OR Apache-2.0
  license_for_new_files: GPL-2.0-only
  new_notice_c: |
    /*
     * SPDX-FileCopyrightText: {years} Espressif Systems (Shanghai) CO LTD
     *
     * SPDX-License-Identifier: {license}
     */
  espressif_copyright: '{years} Espressif Systems (Shanghai) CO LTD'
  include:
    - esp_hosted_fg/host/linux/

ignore:
  perform_check: no
  include:
    - esp_hosted_fg/common/esp_hosted_config.pb-c.c   # generated protobuf-c
    - esp_hosted_fg/common/include/esp_hosted_config.pb-c.h
    - esp_hosted_fg/common/protobuf-c/                # vendored third-party
    - esp_hosted_fg/docs/
    - build/
    - managed_components/
